    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .wrapper { display:flex; max-width:1000px; margin:0 auto; padding:40px 24px; gap:48px; }

    .s-nav { text-align:left; border-top:1px solid var(--border); padding-top:14px; }

    section { margin-bottom:40px; }
    h2 { font-family:var(--font-serif); font-size:22px; font-weight:normal; border-bottom:1px solid var(--border); padding-bottom:7px; margin-bottom:18px; }

    .pub-list { list-style:none; padding:0; }
    .pub-item { display:flex; gap:18px; margin-bottom:22px; padding-bottom:22px; border-bottom:1px solid var(--border); }
    .pub-item:last-child { border-bottom:none; }
    .pub-thumb { width:110px; height:72px; flex-shrink:0; border-radius:4px; background:var(--bg-alt); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; }
    .thumb-badge { font-size:11px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; padding:4px 8px; border-radius:3px; color:#fff; text-align:center; line-height:1.3; }
    .pub-body { flex:1; min-width:0; }
    .pub-title { font-size:15px; font-weight:600; line-height:1.4; margin-bottom:4px; }
    .pub-authors { font-size:13px; color:var(--text-muted); margin-bottom:3px; line-height:1.5; }
    .pub-authors strong { color:var(--text); }
    .pub-venue { font-size:13px; font-style:italic; color:var(--text-muted); margin-bottom:7px; }
    .pub-venue strong { font-style:normal; color:var(--text); }
    .pub-links { display:flex; flex-wrap:wrap; gap:5px; }
    .pl { font-size:12px; padding:2px 8px; border:1px solid var(--border); border-radius:3px; color:var(--accent); }

    .edu-list { list-style:none; padding:0; }

    .edu-inst { font-size:15px; font-weight:600; margin-bottom:2px; }
    .edu-detail { font-size:13px; color:var(--text-muted); margin-bottom:1px; }
    .aw-list { list-style:none; padding:0; }
    .aw-item { display:flex; gap:12px; padding:6px 0; border-bottom:1px solid var(--border); font-size:14px; }
    .aw-item:last-child { border-bottom:none; }
    .aw-year { font-size:12px; color:var(--text-muted); min-width:38px; flex-shrink:0; padding-top:2px; }
    .sk-group { margin-bottom:14px; }
    .sk-group h4 { font-size:12px; text-transform:uppercase; letter-spacing:.07em; color:var(--text-muted); margin-bottom:8px; }
    .sk-tags { display:flex; flex-wrap:wrap; gap:6px; }
    .sk-tag { font-size:12px; padding:3px 10px; background:var(--bg-alt); border:1px solid var(--border); border-radius:12px; color:var(--text); }
    footer { text-align:center; padding:20px; font-size:12px; color:var(--text-muted); border-top:1px solid var(--border); }
    @media (max-width:680px) { .wrapper { flex-direction:column; gap:28px; } .sidebar { width:100%; position:static; } .pub-thumb { display:none; } }

</head>

/* ============================================================

const JOURNAL_COLORS = {
  JACS:     "#c0392b",
  Org:      "#2980b9",
  NatComm:  "#2c3e50",
  SciAdv:   "#e67e22",
  ACSomega: "#27ae60",
  ChemComm: "#8e44ad",
};

function authorHTML(str) {
  return str
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/†/g, "†");
}

function buildPage() {
  // Sidebar
  const avatarSrc = ME.photo
    ? ME.photo
    : `data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="150" height="150"><rect width="150" height="150" rx="75" fill="%23d0e8f8"/><text x="75" y="95" font-size="48" text-anchor="middle" fill="%232a5c8a" font-family="Georgia">${ME.name[0]}</text></svg>`;
  document.getElementById("avatar").src = avatarSrc;
  document.getElementById("sb-name").textContent = ME.name;
  document.getElementById("sb-pos").textContent = ME.position;
  document.getElementById("sb-aff").textContent = ME.affiliation;
  document.getElementById("sb-email").textContent = ME.email.replace("@", " (at) ");
  document.title = `${ME.name} | ${ME.affiliation.split(" ").slice(-1)[0]}`;

  const links = document.getElementById("sb-links");
  if (ME.scholar) links.innerHTML += `<a href="${ME.scholar}" target="_blank"><i class="fas fa-graduation-cap"></i>Google Scholar</a>`;
  links.innerHTML += `<a href="mailto:${ME.email}"><i class="fas fa-envelope"></i>Email</a>`;
  if (ME.linkedin) links.innerHTML += `<a href="${ME.linkedin}" target="_blank"><i class="fab fa-linkedin"></i>LinkedIn</a>`;
  if (ME.cv) links.innerHTML += `<a href="${ME.cv}" target="_blank"><i class="fas fa-file-pdf"></i>CV</a>`;

  // About
  document.getElementById("about-text").innerHTML = ME.about;

  // Research
  const rl = document.getElementById("research-list");
  ME.research.forEach(r => {
    const li = document.createElement("li");
    li.innerHTML = `<strong>${r.bold}</strong> ${r.text}`;
    rl.appendChild(li);
  });

  // Publications
  const pl = document.getElementById("pub-list");
  PUBS.forEach(p => {
    const color = JOURNAL_COLORS[p.journal] || "#888";
    const statusHTML = p.status === "published"
      ? (p.doi ? `<a class="pl" href="${p.doi}" target="_blank">Paper</a>` : "")
      : `<span class="pb">${p.status === "under review" ? "Under Review" : "Under Revision"}</span>`;

    pl.innerHTML += `
      <li class="pub-item">
        <div class="pub-thumb">
          <span class="thumb-badge" style="background:${color}">${p.journal}</span>
        </div>
        <div class="pub-body">
          <div class="pub-title">${p.title}</div>
          <div class="pub-authors">${authorHTML(p.authors)}</div>
          <div class="pub-venue">${p.venue}</div>
          <div class="pub-links">${statusHTML}</div>
        </div>
      </li>`;
  });

  // Education
  const el = document.getElementById("edu-list");
  EDUCATION.forEach(e => {
    el.innerHTML += `
      <li class="edu-item">
        <div class="edu-logo">${e.logo}</div>
        <div>
          <div class="edu-inst">${e.inst}</div>
          ${e.lines.map((l, i) => `<div class="edu-detail" ${i === e.lines.length - 1 ? "" : ""}>${l}</div>`).join("")}
        </div>
      </li>`;
  });

  // Awards
  const al = document.getElementById("award-list");
  AWARDS.forEach(a => {
    al.innerHTML += `<li class="aw-item"><span class="aw-year">${a.year}</span><span>${a.text}</span></li>`;
  });

  // Skills
  const sl = document.getElementById("skill-list");
  SKILLS.forEach(s => {
    sl.innerHTML += `
      <div class="sk-group">
        <h4>${s.category}</h4>
        <div class="sk-tags">${s.tags.map(t => `<span class="sk-tag">${t}</span>`).join("")}</div>
      </div>`;
  });

  // Services
  document.getElementById("services-text").innerHTML = SERVICES;
}

document.addEventListener("DOMContentLoaded", buildPage);
</script>
